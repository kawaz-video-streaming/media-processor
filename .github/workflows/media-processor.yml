name: media-processor

on:
  push:
    branches: [master]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/media-processor

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: kawaz
          location: europe-west3-a
          project_id: kawaz-video-streaming

      - name: Apply ConfigMap
        run: |
          kubectl create configmap media-processor-config \
            --from-literal=NODE_ENV=${{ vars.NODE_ENV }} \
            --from-literal=PORT=${{ vars.PORT }} \
            --from-literal=AWS_ENDPOINT=${{ vars.AWS_ENDPOINT }} \
            --from-literal=AWS_REGION=${{ vars.AWS_REGION }} \
            --from-literal=VOD_BUCKET_NAME=${{ vars.VOD_BUCKET_NAME }} \
            --from-literal=THUMBNAIL_INTERVAL_IN_SECONDS=${{ vars.THUMBNAIL_INTERVAL_IN_SECONDS }} \
            --from-literal=THUMBNAIL_WIDTH=${{ vars.THUMBNAIL_WIDTH }} \
            --from-literal=THUMBNAIL_HEIGHT=${{ vars.THUMBNAIL_HEIGHT }} \
            --from-literal=THUMBNAIL_COLS=${{ vars.THUMBNAIL_COLS }} \
            --namespace kawaz \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Secret
        run: |
          kubectl create secret generic media-processor-secrets \
            --from-literal=MONGO_CONNECTION_STRING=${{ secrets.MONGO_CONNECTION_STRING }} \
            --from-literal=AMQP_CONNECTION_STRING=${{ secrets.AMQP_CONNECTION_STRING }} \
            --from-literal=AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            --from-literal=AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            --namespace kawaz \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy
        run: |
          kubectl set image deployment/media-processor \
            media-processor=${{ env.IMAGE }}:${{ github.sha }} \
            --namespace kawaz
          kubectl rollout status deployment/media-processor --namespace kawaz --timeout=120s